<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__PROJECT_NAME__ — app</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
</head>
<body>
  <main class="wrap">
    <section id="view-auth" class="view">
      <h2>Sign in</h2>
      <form id="auth-form">
        <input type="email" id="auth-email" placeholder="you@example.com" required />
        <button type="submit">Continue</button>
      </form>
      <p id="auth-sent" class="hidden">Check your email for a sign-in link.</p>
    </section>

    <section id="view-dashboard" class="view hidden">
      <p>Signed in as <span id="user-chip"></span>. <button id="sign-out">Sign out</button></p>
      <p>This is your starter. Add your app here.</p>
    </section>
  </main>
  <script src="./js/app.js"></script>
</body>
</html>
